<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aurum Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-3xl mb-4">🚀 Aurum Dashboard</h1>

<!-- ADMIN BUTTON -->
<button onclick="openAdminModal()"
 class="bg-blue-500 px-3 py-1 rounded mb-4">
 + Add Admin
</button>

<!-- ANALYTICS -->
<div class="bg-gray-800 p-4 mb-4 rounded">
  📊 Total: <span id="total"></span> |
  Active: <span id="active"></span> |
  Paused: <span id="paused"></span>
</div>

<!-- CREATE LICENSE -->
<div class="bg-gray-800 p-4 rounded mb-4">
<input id="username" placeholder="Username"
 class="p-2 text-black w-full mb-2">

<input id="account" placeholder="Account Number"
 class="p-2 text-black w-full mb-2">

<input id="hwid" placeholder="HWID / Device ID"
 class="p-2 text-black w-full mb-2">

<select id="period" class="p-2 text-black w-full mb-2">
<option value="1m">1 Month</option>
<option value="2m">2 Month</option>
<option value="custom">Custom</option>
</select>

<input id="to" type="date" class="p-2 text-black w-full mb-2">

<button onclick="createLicense()"
 class="bg-green-500 px-3 py-1">Create</button>
</div>

<!-- LIST -->
<div id="list"></div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="hidden fixed top-0 left-0 w-full h-full bg-black bg-opacity-50">
<div class="bg-gray-800 p-5 m-20 rounded">

<h2>Add Admin</h2>

<input id="adminName" placeholder="Name" class="p-2 text-black w-full mb-2">
<input id="adminEmail" placeholder="Email" class="p-2 text-black w-full mb-2">
<input id="adminPass" placeholder="Password" class="p-2 text-black w-full mb-2">

<input id="adminExpiry" type="date" class="p-2 text-black w-full mb-2">

<button onclick="createAdmin()" class="bg-green-500 px-3 py-1">Create</button>
<button onclick="closeAdminModal()" class="bg-red-500 px-3 py-1">Cancel</button>

</div>
</div>

<script>

// ================= CREATE LICENSE =================
async function createLicense(){
 await fetch("/create", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    username:document.getElementById("username").value,
    account:document.getElementById("account").value,
    hwid:document.getElementById("hwid").value,
    period:document.getElementById("period").value,
    to:document.getElementById("to").value
  })
 });
 load();
}

// ================= LOAD =================
async function load(){
 let res = await fetch("/all");
 let data = await res.json();

 let html = "";

 for(let k in data){
  let v = data[k];

  html += `
  <div class="bg-gray-800 p-4 mb-2 rounded">
    <b>${v.username}</b><br>
    🔑 ${k}<br>
    💻 HWID: ${v.hwid || "Not set"}<br>
    📊 Accounts: ${v.accounts && v.accounts.length ? v.accounts.join(", ") : "None"}<br>
    📅 Expiry: ${v.expiry}

    <button onclick="pause('${k}')" class="bg-yellow-500 px-2">Pause</button>
    <button onclick="del('${k}')" class="bg-red-500 px-2">Delete</button>
  </div>
  `;
 }

 document.getElementById("list").innerHTML = html;
}

// ================= ANALYTICS =================
async function loadAnalytics(){
 let res = await fetch("/analytics");
 let d = await res.json();

 document.getElementById("total").innerText = d.total;
 document.getElementById("active").innerText = d.active;
 document.getElementById("paused").innerText = d.paused;
}

// ================= PAUSE =================
async function pause(k){
 await fetch("/pause", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({license:k})
 });
 load();
}

// ================= DELETE =================
async function del(k){
 await fetch("/delete", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({license:k})
 });
 load();
}

// ================= ADMIN =================
function openAdminModal(){
 document.getElementById("adminModal").classList.remove("hidden");
}

function closeAdminModal(){
 document.getElementById("adminModal").classList.add("hidden");
}

async function createAdmin(){
 await fetch("/add_admin", {
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    name:document.getElementById("adminName").value,
    email:document.getElementById("adminEmail").value,
    password:document.getElementById("adminPass").value,
    expiry:document.getElementById("adminExpiry").value
  })
 });

 alert("Admin Added");
 closeAdminModal();
}

// INIT
load();
loadAnalytics();

</script>

</body>
</html>
